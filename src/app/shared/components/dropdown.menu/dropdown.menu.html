<button
  (click)="toggle()"
  class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/10 transition-colors"
>
  <fa-icon [icon]="icon()"></fa-icon>
  <span class="flex-1 text-left text-sm">{{ title() }}</span>
  <fa-icon [icon]="faAngleRight"></fa-icon>
</button>
@if (isOpen()) {
  <div class="ml-8 mt-1 space-y-1">
    @for (subtitle of subtitles(); track subtitle) {
      <a
        class="block px-3 py-1.5 text-sm rounded-lg transition-colors text-white/70 hover:bg-white/10 hover:text-white"
        [routerLink]="subtitle.href"
        >{{ subtitle.text }}</a
      >
    }
  </div>
}
