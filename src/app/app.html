<div class="flex h-screen bg-[#FAF8F5]">
  <div class="w-64 bg-gradient-to-b from-[#1E3A5F] to-[#16304F] text-white flex flex-col">
    <div class="p-4 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-full bg-gradient-to-br from-[#2D9596] to-[#E8A838] flex items-center justify-center"
        >
          <span class="text-sm font-bold">MB</span>
        </div>
        <div class="flex-1">
          <p class="text-xs text-white/60 uppercase tracking-wide">PROJECT MANAGER</p>
          <p class="text-sm font-medium">Mayerlin Becerra</p>
        </div>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto p-4">
      <div class="mb-6">
        <p class="text-xs text-white/50 uppercase tracking-wide mb-3 px-2">Main</p>
        <div class="mb-2">
          <app-dropdown-menu
            [title]="menu[0].title"
            [subtitles]="menu[0].subtitles"
            [icon]="menu[0].icon"
          />
        </div>
        <div class="mb-2">
          <app-dropdown-menu
            [title]="menu[1].title"
            [subtitles]="menu[1].subtitles"
            [icon]="menu[1].icon"
          />
        </div>
        <a
          routerLink="notificaciones"
          class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors hover:bg-white/10"
        >
          <fa-icon [icon]="faBell" />
          <span class="text-sm">Notificaciones</span>
        </a>
      </div>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto">
    <router-outlet />
  </div>
</div>
