<div
  class="mb-8 p-6 rounded-xl bg-gradient-to-br from-[#FAF8F5] to-white border border-[#E4DDD1]"
  style="opacity: 1; height: auto"
>
  <h3 class="text-lg mb-4 text-[#1E3A5F]" style="font-weight: 600">Configuración de SFTP</h3>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <span class="flex items-center gap-2 text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">
        <fa-icon [icon]="faServer" class="w-4 h-4" />
        Host /servidor
      </span>
      <input
        type="text"
        class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
        placeholder="ftp.ejemplo.com"
      />
    </div>
    <div>
      <span class="flex items-center gap-2 text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">
        <fa-icon [icon]="faEthernet" class="w-4 h-4" />
        Puerto
      </span>
      <input
        type="text"
        class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
        placeholder="22"
      />
    </div>
    <div>
      <span class="flex items-center gap-2 text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">
        <fa-icon [icon]="faUser" class="w-4 h-4" />
        Usuario
      </span>
      <input
        type="text"
        class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
        placeholder="usuario"
      />
    </div>
    <div>
      <span class="flex items-center gap-2 text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">
        <fa-icon [icon]="faKey" class="w-4 h-4" />
        Contraseña
      </span>
      <div class="relative">
        @if (showPassword()) {
          <input
            type="text"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
          />
          <button
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-[#2D9596] hover:underline"
            (click)="showPassword.set(false)"
          >
            Ocultar
          </button>
        } @else {
          <input
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
          />
          <button
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-[#2D9596] hover:underline"
            (click)="showPassword.set(true)"
          >
            Mostrar
          </button>
        }
      </div>
    </div>
    <div class="col-span-2">
      <span class="flex items-center gap-2 text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">
        <fa-icon [icon]="faFolder" class="w-4 h-4" />
        Carpeta / Ruta
      </span>
      <input
        type="text"
        class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
        placeholder="/uploads/archivos"
      />
    </div>
  </div>
</div>
