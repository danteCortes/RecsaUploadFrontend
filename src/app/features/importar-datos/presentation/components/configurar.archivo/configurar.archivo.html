<div
  [ngClass]="{
    'p-5 rounded-xl border-2 transition-all': true,
    'border-[#E4DDD1] bg-white': !isOpen(),
    'border-[#2D9596] bg-[#2D9596]/5': isOpen(),
  }"
  style="opacity: 1; transform: none"
>
  <div class="flex items-center gap-3 mb-4">
    <div class="flex flex-col items-center gap-1 flex-shrink-0">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-lg bg-gradient-to-br from-[#E8A838] to-[#C68B28] text-white font-bold text-lg shadow-md"
      >
        {{ index() + 1 }}
      </div>
      <div class="flex gap-0.5">
        <button
          [disabled]="index() === 0"
          class="p-1 rounded hover:bg-[#1E3A5F]/10 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
          title="Mover arriba"
        >
          <fa-icon [icon]="faAngleUp" class="w-3.5 h-3.5 text-[#1E3A5F]" />
        </button>
        <button
          [disabled]="index() === files().length - 1"
          class="p-1 rounded hover:bg-[#1E3A5F]/10 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
          title="Mover abajo"
        >
          <fa-icon [icon]="faAngleDown" class="w-3.5 h-3.5 text-[#1E3A5F]" />
        </button>
      </div>
    </div>
    <button class="flex-1 flex items-center justify-between" (click)="toggle()">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#1E3A5F] to-[#2D9596] flex items-center justify-center"
        >
          <fa-icon [icon]="faFileLines" class="text-white" />
        </div>
        <div class="text-left">
          <p class="font-medium text-[#1A1614]">{{ file().file.name }}</p>
          <p class="text-sm text-[#1A1614]/50">
            {{ getFileExtension(file().file) }} • Sin configurar
          </p>
        </div>
      </div>
      <span class="px-3 py-1 rounded-full bg-[#E8A838]/10 text-[#E8A838] text-sm">Pendiente</span>
    </button>
  </div>
  @if (isOpen()) {
    <div class="pt-4 border-t border-[#E4DDD1]">
      <div class="grid grid-cols-2 gap-4">
        @if (getFileExtension(file().file) === 'TXT' || getFileExtension(file().file) === 'CSV') {
          <div>
            <span class="block text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500"
              >Delimitador</span
            >
            <select
              class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
              [(ngModel)]="form().delimiter"
            >
              <option value=";">Punto y coma (;)</option>
              <option value=",">Coma (,)</option>
              <option value="|">Barra vertical (|)</option>
              <option value="\t">Tabulación</option>
            </select>
          </div>
        }
        <div>
          <span class="block text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500"
            >Separador decimal</span
          >
          <select
            class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
              [(ngModel)]="form().separator"
          >
            <option value=",">Coma (,)</option>
            <option value=".">Punto (.)</option>
          </select>
        </div>
        <div>
          <span class="block text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500"
            >Codificación</span
          >
          <select
            class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
              [(ngModel)]="form().encoding"
          >
            <option value="UTF-8">UTF-8</option>
            <option value="Latin1">Latin1</option>
            <option value="Windows-1252">Windows-1252</option>
          </select>
        </div>
        @if (getFileExtension(file().file) === 'XLSX') {
          <div>
            <span class="block text-sm mb-2 text-[#1A1614]/70" style="font-weight: 500">Hoja</span>
            <select
              class="w-full px-4 py-2.5 rounded-lg border border-[#E4DDD1] bg-white focus:outline-none focus:border-[#2D9596] focus:ring-2 focus:ring-[#2D9596]/20 transition-all"
              [(ngModel)]="form().spreadsheet"
            >
              @for (spreadsheet of spreadsheets(); track $index) {
                <option [value]="spreadsheet">{{ spreadsheet }}</option>
              }
            </select>
          </div>
        }
      </div>
      <span class="flex items-center gap-3 cursor-pointer group mt-4">
        <input
          type="checkbox"
          class="w-5 h-5 rounded border-[#E4DDD1] text-[#2D9596] focus:ring-[#2D9596]/20"
          [(ngModel)]="form().firstRowHeaders"
        />
        <span class="text-sm text-[#1A1614]/70 group-hover:text-[#1A1614] transition-colors"
          >La primera fila contiene encabezados</span
        >
      </span>
      <button
        class="mt-4 w-full px-6 py-3 rounded-lg font-medium transition-all flex items-center justify-center gap-2 bg-[#1E3A5F] text-white hover:bg-[#152944] shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-md"
        (click)="updateConfigurationFile()"
      >
        <fa-icon [icon]="faSave" />
        Guardar Configuración
      </button>
    </div>
  }
</div>
