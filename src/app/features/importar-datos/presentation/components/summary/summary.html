<div class="bg-white rounded-2xl p-6 shadow-lg shadow-[#1E3A5F]/5 border border-[#E4DDD1]">
  <div class="mb-6 pb-6 border-b border-[#E4DDD1]">
    <h3 class="text-xl mb-1 text-[#1E3A5F]">Resumen de importación</h3>
    <p class="text-sm text-[#1A1614]/60">Paso {{ getStep() }} de 5</p>
  </div>
  <div class="space-y-4 mb-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <fa-icon [icon]="faFileLines" class="text-[#1E3A5F]" />
        <span class="text-sm text-[#1A1614]/70">Archivos</span>
      </div>
      <span class="font-medium text-[#1E3A5F]">{{ files().length }}</span>
    </div>
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <fa-icon [icon]="faDatabase" class="text-[#1E3A5F]" />
        <span class="text-sm text-[#1A1614]/70">Formatos</span>
      </div>
      <span class="font-medium text-sm text-[#1E3A5F]">{{
        getExtensions(files().map((f) => f.file))
      }}</span>
    </div>
  </div>
  <div class="pt-6 border-t border-[#E4DDD1]">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm text-[#1A1614]/70">Progreso</span>
      <span class="text-sm font-medium text-[#1E3A5F]">{{ getPercent() }}</span>
    </div>
    <div class="h-2 bg-[#E4DDD1] rounded-full overflow-hidden w-full">
      <div
        class="h-full bg-gradient-to-r from-[#1E3A5F] to-[#2D9596] rounded-full"
        [ngClass]="getWidth()"
      ></div>
    </div>
  </div>
</div>
