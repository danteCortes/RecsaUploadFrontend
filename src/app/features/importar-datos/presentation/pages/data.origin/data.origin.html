<div
  class="bg-white rounded-2xl p-8 shadow-lg shadow-[#1E3A5F]/5"
  style="opacity: 1; transform: none"
>
  <h2 class="text-3xl mb-2 text-[#1E3A5F]" style="font-weight: 700">Origen de datos</h2>
  <p class="text-[#1A1614]/60 mb-8">Configurá de dónde se recibirán los archivos</p>
  <div class="mb-8">
    <h3 class="text-lg mb-4 text-[#1E3A5F]" style="font-weight: 600">Tipo de origen</h3>
    <div class="grid grid-cols-3 gap-4">
      <button
        [ngClass]="{
          'p-5 rounded-xl border-2 transition-all': true,
          'border-[#E4DDD1] bg-white hover:border-[#2D9596]/50': originType() !== 'sftp',
          'border-[#2D9596] bg-gradient-to-br from-[#2D9596]/10 to-[#2D9596]/5 shadow-md':
            originType() === 'sftp',
        }"
        style="transform: none"
        (click)="originType.set('sftp')"
      >
        <fa-icon [icon]="faServer" class="w-8 h-8 mb-3 text-[#1A1614]/40" />
        <p class="font-medium mb-1 text-[#1A1614]">SFTP</p>
        <p class="text-sm text-[#1A1614]/60">Conexión segura por protocolo SFTP</p>
      </button>
      <button
        [ngClass]="{
          'p-5 rounded-xl border-2 transition-all': true,
          'border-[#E4DDD1] bg-white hover:border-[#2D9596]/50': originType() !== 'email',
          'border-[#2D9596] bg-gradient-to-br from-[#2D9596]/10 to-[#2D9596]/5 shadow-md':
            originType() === 'email',
        }"
        style="transform: none"
        (click)="originType.set('email')"
      >
        <fa-icon [icon]="faEnvelope" class="w-8 h-8 mb-3 text-[#1A1614]/40" />
        <p class="font-medium mb-1 text-[#1A1614]">Correo electrónico</p>
        <p class="text-sm text-[#1A1614]/60">Recibir archivos por correo electrónico</p>
      </button>
      <button
        [ngClass]="{
          'p-5 rounded-xl border-2 transition-all': true,
          'border-[#E4DDD1] bg-white hover:border-[#2D9596]/50': originType() !== 'teams',
          'border-[#2D9596] bg-gradient-to-br from-[#2D9596]/10 to-[#2D9596]/5 shadow-md':
            originType() === 'teams',
        }"
        style="transform: none"
        (click)="originType.set('teams')"
      >
        <fa-icon [icon]="faEnvelope" class="w-8 h-8 mb-3 text-[#1A1614]/40" />
        <p class="font-medium mb-1 text-[#1A1614]">Microsoft Teams</p>
        <p class="text-sm text-[#1A1614]/60">
          Recibir archivos desde Teams para procesamiento automático
        </p>
      </button>
    </div>
  </div>
  @if (originType() === 'sftp') {
    <app-form-sftp />
  } @else if (originType() === 'email') {
    <app-form-email />
  } @else if (originType() === 'teams') {
    <app-form-teams />
  }
  <div class="flex justify-between">
    <button
      class="px-8 py-3 rounded-xl border-2 border-[#E4DDD1] text-[#1A1614] font-medium hover:border-[#1E3A5F] hover:bg-[#FAF8F5] transition-all flex items-center gap-2"
      routerLink="/cargas/importar/manual/nueva/columnas"
    >
      <fa-icon [icon]="faArrowLeft" class="h-5 w-5" />
      Volver
    </button>
    <button
      disabled
      class="px-8 py-3 rounded-xl bg-gradient-to-r from-[#1E3A5F] to-[#2D9596] text-white font-medium shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center gap-2"
    >
      Continuar
      <fa-icon [icon]="faCheck" class="h-5 w-5" />
    </button>
  </div>
</div>
