<div class="p-8 max-w-5xl">
  <!-- Volver -->
  <a routerLink="/empresas/interfaces" class="inline-flex items-center gap-2 text-[#2D9596] hover:text-[#1E3A5F] transition-colors mb-6 text-sm font-medium">
    <fa-icon [icon]="faArrowLeft" class="text-xs" />
    Volver a integraciones
  </a>

  <h1 class="text-3xl font-bold text-[#1E3A5F] mb-1">Nueva integración</h1>
  <p class="text-[#1A1614]/60 mb-8">Creá una o más integraciones para el sistema</p>

  <!-- Items de integración -->
  @for (item of items(); track item.id) {
    <div class="bg-white rounded-xl border border-[#E4DDD1] p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-[#1A1614]/70">Integración {{ item.id }}</h2>
        @if (items().length > 1) {
          <button (click)="eliminar(item.id)" class="text-[#1A1614]/40 hover:text-[#D16666] transition-colors text-xs flex items-center gap-1">
            <fa-icon [icon]="faTrash" />
          </button>
        }
      </div>
      <div class="grid grid-cols-3 gap-4">
        <input
          type="text"
          placeholder="Ej: ASIGNACION"
          class="px-4 py-2.5 rounded-lg border border-[#E4DDD1] text-sm text-[#1A1614] placeholder:text-[#1A1614]/40 focus:outline-none focus:border-[#2D9596] transition-colors"
        />
        <select class="px-4 py-2.5 rounded-lg border border-[#E4DDD1] text-sm text-[#1A1614]/60 focus:outline-none focus:border-[#2D9596] transition-colors bg-white">
          <option value="" disabled selected>Seleccionar país</option>
          @for (p of paises; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
        <select class="px-4 py-2.5 rounded-lg border border-[#E4DDD1] text-sm text-[#1A1614]/60 focus:outline-none focus:border-[#2D9596] transition-colors bg-white">
          <option value="" disabled selected>Seleccionar empresa</option>
          @for (e of empresas; track e) {
            <option [value]="e">{{ e }}</option>
          }
        </select>
      </div>
    </div>
  }

  <!-- Agregar más -->
  <button
    (click)="agregarMas()"
    class="w-full py-3 rounded-xl border-2 border-dashed border-[#2D9596]/40 text-[#2D9596] hover:border-[#2D9596] hover:bg-[#2D9596]/5 transition-colors text-sm font-medium mb-8"
  >
    + Agregar más
  </button>

  <!-- Acciones -->
  <div class="flex justify-end gap-3">
    <a routerLink="/empresas/interfaces" class="px-5 py-2 rounded-lg border border-[#1A1614]/20 text-[#1A1614]/70 hover:bg-[#1A1614]/5 transition-colors text-sm font-medium">
      Cancelar
    </a>
    <button class="px-5 py-2 rounded-lg bg-[#1E3A5F] text-white hover:bg-[#16304F] transition-colors text-sm font-medium">
      Guardar
    </button>
  </div>
</div>
